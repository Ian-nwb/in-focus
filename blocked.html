<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>in-focus - Blocked</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(160deg, #cbe3f7 0%, #e8f4ff 50%, #f5f0ff 100%);
      color: #3a5f80;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Floating blobs */
    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.45);
      filter: blur(2px);
      animation: floatCloud 8s ease-in-out infinite;
    }

    .cloud-1 { width: 180px; height: 80px; top: 6%; left: -40px; animation-delay: 0s; border-radius: 60px; }
    .cloud-2 { width: 120px; height: 55px; top: 14%; right: -20px; animation-delay: 2.5s; border-radius: 50px; }
    .cloud-3 { width: 90px;  height: 40px; bottom: 18%; left: 5%; animation-delay: 1s; border-radius: 40px; }
    .cloud-4 { width: 150px; height: 65px; bottom: 8%; right: 2%; animation-delay: 3.5s; border-radius: 55px; }

    @keyframes floatCloud {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    /* SVG star decorations */
    .star {
      position: absolute;
      opacity: 0.35;
      animation: twinkle 4s ease-in-out infinite;
    }

    .star-1 { top: 10%; left: 12%; animation-delay: 0s; }
    .star-2 { top: 20%; right: 15%; animation-delay: 1.5s; }
    .star-3 { bottom: 25%; left: 8%; animation-delay: 0.8s; }
    .star-4 { bottom: 15%; right: 10%; animation-delay: 2s; }
    .star-5 { top: 55%; left: 4%; animation-delay: 3s; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.2); }
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid rgba(255, 255, 255, 0.85);
      border-radius: 28px;
      padding: 44px 40px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(91, 143, 185, 0.14), 0 2px 8px rgba(91, 143, 185, 0.08);
      position: relative;
      z-index: 10;
    }

    /* Mascot */
    .mascot {
      display: block;
      margin-bottom: 8px;
      animation: bobble 3s ease-in-out infinite;
    }

    @keyframes bobble {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50%       { transform: translateY(-7px) rotate(2deg); }
    }

    /* Tag pill */
    .tag {
      display: inline-block;
      background: linear-gradient(135deg, #cbe3f7, #d8ecff);
      color: #5b8fb9;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 26px;
      font-weight: 900;
      color: #5b8fb9;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    h1 span {
      color: #f4a7b9;
    }

    p {
      font-size: 14px;
      font-weight: 600;
      color: #7aabcf;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .pill-divider {
      width: 48px;
      height: 4px;
      background: linear-gradient(90deg, #a8d5f5, #f4a7b9);
      border-radius: 999px;
      margin: 0 auto 24px;
    }

    /* Okay button */
    .okay-btn {
      display: inline-block;
      padding: 11px 32px;
      background: linear-gradient(135deg, #5b8fb9, #7aaed4);
      color: #ffffff;
      border-radius: 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 14px rgba(91, 143, 185, 0.32);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      border: none;
    }

    .okay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 20px rgba(91, 143, 185, 0.40);
    }

    .okay-btn:active {
      transform: scale(0.96);
    }

    .footer-note {
      margin-top: 20px;
      font-size: 11px;
      font-weight: 600;
      color: #b0d0ec;
    }

    /* Floating spawned SVGs */
    .floatie {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: floatUp 2.2s ease-out forwards;
      font-size: 0; /* no text fallback */
    }

    @keyframes floatUp {
      0%   { transform: translateY(0px) scale(1) rotate(0deg);   opacity: 1; }
      60%  { transform: translateY(-180px) scale(1.1) rotate(12deg); opacity: 0.9; }
      100% { transform: translateY(-320px) scale(0.7) rotate(20deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- SVG star decorations -->
  <span class="star star-1">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#7aaed4" xmlns="http://www.w3.org/2000/svg">
      <polygon points="8,1 9.5,6 15,6 10.5,9.5 12,14.5 8,11 4,14.5 5.5,9.5 1,6 6.5,6"/>
    </svg>
  </span>
  <span class="star star-2">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="#a8d5f5" xmlns="http://www.w3.org/2000/svg">
      <polygon points="8,1 9.5,6 15,6 10.5,9.5 12,14.5 8,11 4,14.5 5.5,9.5 1,6 6.5,6"/>
    </svg>
  </span>
  <span class="star star-3">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="#7aaed4" xmlns="http://www.w3.org/2000/svg">
      <polygon points="8,1 9.5,6 15,6 10.5,9.5 12,14.5 8,11 4,14.5 5.5,9.5 1,6 6.5,6"/>
    </svg>
  </span>
  <span class="star star-4">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#a8d5f5" xmlns="http://www.w3.org/2000/svg">
      <polygon points="8,1 9.5,6 15,6 10.5,9.5 12,14.5 8,11 4,14.5 5.5,9.5 1,6 6.5,6"/>
    </svg>
  </span>
  <span class="star star-5">
    <svg width="9" height="9" viewBox="0 0 16 16" fill="#7aaed4" xmlns="http://www.w3.org/2000/svg">
      <polygon points="8,1 9.5,6 15,6 10.5,9.5 12,14.5 8,11 4,14.5 5.5,9.5 1,6 6.5,6"/>
    </svg>
  </span>

  <!-- Floating cloud blobs -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>

  <div class="card">

    <!-- SVG cloud mascot -->
    <span class="mascot">
      <svg width="80" height="54" viewBox="0 0 80 54" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="40" cy="42" rx="34" ry="12" fill="#c4dcf5"/>
        <ellipse cx="30" cy="36" rx="20" ry="14" fill="#daeefb"/>
        <ellipse cx="50" cy="33" rx="18" ry="14" fill="#daeefb"/>
        <ellipse cx="40" cy="26" rx="16" ry="16" fill="#eef6fd"/>
        <ellipse cx="28" cy="30" rx="10" ry="10" fill="#f5fbff"/>
        <ellipse cx="52" cy="28" rx="9" ry="9" fill="#f5fbff"/>
      </svg>
    </span>

    <div class="tag">in-focus &middot; blocked</div>

    <h1>Oopsie! <span>Not now~</span></h1>

    <div class="pill-divider"></div>

    <p>
      You blocked this site so you could<br>
      do something important. You've got this!
    </p>

    <button class="okay-btn" id="okayBtn">okay !</button>

    <p class="footer-note">stay cute &amp; stay on task ~</p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
